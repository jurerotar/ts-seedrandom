runs:
  using: "composite"
  steps:
    - name: Use Node.js LTS
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 'lts/*'
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install modules
      shell: bash
      run: npm ci --prefer-offline --no-audit --no-fund
